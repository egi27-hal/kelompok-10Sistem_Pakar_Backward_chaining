<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pakar Identifikasi Hewan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Sistem Pakar Identifikasi Hewan menggunakan metode Backward Chaining.">
</head>
<body>
    <div class="decor-blob blob-1"></div>
    <div class="decor-blob blob-2"></div>

    <main id="app">
        <div class="glass-card">
            <header>
                <h1>Sistem Pakar Hewan</h1>
                <p class="subtitle">Identifikasi Jenis Hewan Berdasarkan Karakteristik</p>
            </header>

            <div id="bc-section">
                <!-- Welcome Section -->
                <div id="welcome-screen">
                    <div style="margin-bottom: 3rem; text-align: center;">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                    <button class="btn-primary" id="start-btn">Mulai Identifikasi</button>
                </div>

                <!-- Question Section -->
                <div id="question-screen" style="display: none;">
                    <div class="question-container">
                        <p class="question-text" id="question-text">Apakah hewan tersebut...?</p>
                        <div class="btn-group">
                            <button class="btn-primary" id="yes-btn">Ya, Tentu</button>
                            <button class="btn-outline" id="no-btn">Tidak</button>
                        </div>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-inner" id="progress"></div>
                        </div>
                    </div>
                    <div class="hypothesis-wrapper" style="text-align: center; margin-top: 1rem; margin-bottom: 1rem;">
                        <h3 id="current-hypothesis" style="color: var(--accent); font-weight: 600;">Memeriksa kemungkinan: ...</h3>
                    </div>
                    <div class="candidates-wrapper">
                        <p class="candidates-label">Analisis Kemungkinan:</p>
                        <div id="candidates-list">
                            <!-- Candidates will be injected here -->
                        </div>
                    </div>
                </div>

                <!-- Result Section -->
                <div id="result-screen" style="display: none;" class="result-card">
                    <p class="result-title" id="result-title">HEWAN TERIDENTIFIKASI:</p>
                    <div class="result-image-wrapper" id="result-image-wrapper" style="display: none;">
                        <img id="result-image" src="" alt="Result">
                    </div>
                    <h2 class="result-name" id="result-animal">Nama Hewan</h2>
                    <button class="btn-outline" id="restart-btn">Identifikasi Ulang</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
